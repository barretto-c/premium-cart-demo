<div class="min-h-screen bg-zinc-950 p-6 md:p-12">
  <div class="max-w-4xl mx-auto">
    <button (click)="goBack()" class="text-sm text-blue-400 hover:text-blue-300 mb-6">
      ← Back to Dashboard
    </button>

    <div *ngIf="product" class="bg-zinc-900/40 border border-zinc-800/80 rounded-3xl p-8 backdrop-blur-md">
      <h1 class="text-4xl font-bold text-white mb-4">{{ product.title }}</h1>
      <p class="text-zinc-400 text-lg mb-6">{{ product.description }}</p>
      
      <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
        <div class="bg-zinc-900/60 p-4 rounded-lg">
          <p class="text-zinc-500 text-sm">Price</p>
          <p class="text-3xl font-bold text-white">${{ product.price }}</p>
        </div>
        <div class="bg-zinc-900/60 p-4 rounded-lg">
          <p class="text-zinc-500 text-sm">Rating</p>
          <p class="text-3xl font-bold text-yellow-400">{{ product.rating.rate }}★</p>
        </div>
        <div class="bg-zinc-900/60 p-4 rounded-lg">
          <p class="text-zinc-500 text-sm">Category</p>
          <p class="text-white capitalize">{{ product.category }}</p>
        </div>
      </div>

      <button (click)="addToCart()" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 rounded-full transition-all">
        Add to Cart
      </button>
    </div>

    <div *ngIf="!product" class="text-center text-zinc-400 py-12">
      <p>Product not found</p>
    </div>
  </div>
</div>
